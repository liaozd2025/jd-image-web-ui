<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JD Image Web UI</title>
    <link rel="stylesheet" href="/auth-static/auth.css">
    <script src="/auth-static/home.js" type="module"></script>
  </head>
  <body>
    <main id="server-home" class="workbench">
      <header class="workbench-header">
        <div>
          <h1>JD Image Web UI</h1>
          <p id="current-user" class="subtitle">正在读取登录信息…</p>
        </div>
        <button id="logout-button" class="secondary-button" type="button">退出登录</button>
      </header>

      <section id="session-management" class="panel">
        <div class="panel-heading">
          <div>
            <h2>浏览器会话</h2>
            <p>查看当前有效会话，并随时退出其他浏览器会话。</p>
          </div>
          <div class="button-row">
            <button id="logout-others-button" class="secondary-button" type="button">退出其他设备</button>
            <button id="logout-all-button" class="danger-button" type="button">退出全部设备</button>
          </div>
        </div>
        <div id="session-list" class="item-list" aria-live="polite"></div>
      </section>

      <section id="user-management" class="panel" hidden>
        <div class="panel-heading">
          <div>
            <h2>部门用户</h2>
            <p>创建账号、重置临时密码，或停用和恢复账号。</p>
          </div>
          <form id="create-user-form" class="inline-form">
            <label for="new-username">用户名</label>
            <input id="new-username" autocomplete="off" required maxlength="64">
            <button type="submit">创建用户</button>
          </form>
        </div>
        <div id="temporary-credential" class="credential-box" hidden>
          <strong id="credential-title"></strong>
          <code id="credential-value"></code>
          <p>请立即安全交给用户；该临时密码只显示这一次。</p>
        </div>
        <div id="user-list" class="item-list" aria-live="polite"></div>
      </section>

      <section id="provider-management" class="panel">
        <div class="panel-heading">
          <div>
            <h2>个人供应商</h2>
            <p>从管理员白名单中选择接口，凭据只在保存时提交，页面只显示脱敏结果。</p>
          </div>
        </div>
        <div id="provider-list" class="item-list" aria-live="polite"></div>
      </section>

      <section id="provider-catalog-management" class="panel" hidden>
        <div class="panel-heading">
          <div>
            <h2>供应商目录</h2>
            <p>发布不可覆盖的版本快照，停用版本不会影响既有历史引用。</p>
          </div>
          <form id="create-provider-form" class="provider-form">
            <div><label for="provider-key">标识</label><input id="provider-key" required maxlength="64" pattern="[a-z0-9][a-z0-9-]{1,63}" placeholder="openai-compatible"></div>
            <div><label for="provider-display-name">名称</label><input id="provider-display-name" required maxlength="160" placeholder="OpenAI Compatible"></div>
            <div><label for="provider-base-url">Base URL</label><input id="provider-base-url" required maxlength="2048" type="url" placeholder="https://api.example.com/v1"></div>
            <div><label for="provider-api-mode">调用方式</label><select id="provider-api-mode"><option value="responses">Responses</option><option value="images">Images</option></select></div>
            <div><label for="provider-model-id">首个模型</label><input id="provider-model-id" required maxlength="160" placeholder="gpt-image-1"></div>
            <button type="submit">发布新版本</button>
          </form>
        </div>
        <div id="provider-catalog-list" class="item-list" aria-live="polite"></div>
      </section>

      <section id="asset-management" class="panel">
        <div class="panel-heading">
          <div>
            <h2>个人资产</h2>
            <p id="asset-quota">正在读取存储额度…</p>
          </div>
          <form id="create-asset-form" class="asset-form">
            <label for="asset-kind">类型</label>
            <select id="asset-kind">
              <option value="image">图片</option>
              <option value="reference">参考素材</option>
              <option value="template">模板</option>
              <option value="prompt">提示词片段</option>
            </select>
            <label for="asset-name">名称</label>
            <input id="asset-name" required maxlength="160" placeholder="资产名称">
            <label for="asset-file">文件（模板/提示词也可上传文本）</label>
            <input id="asset-file" type="file" required>
            <button type="submit">保存资产</button>
          </form>
        </div>
        <div id="asset-list" class="item-list" aria-live="polite"></div>
        <div id="asset-trash-list" class="item-list" aria-live="polite"></div>
      </section>

      <section id="task-management" class="panel">
        <div class="panel-heading">
          <div>
            <h2>生图任务</h2>
            <p>任务提交后由独立 Worker 执行，页面会自动刷新状态。</p>
          </div>
          <form id="create-task-form" class="task-form">
            <label for="task-provider">供应商版本</label>
            <select id="task-provider" required></select>
            <label for="task-model">模型</label>
            <select id="task-model" required></select>
            <label for="task-prompt">提示词</label>
            <textarea id="task-prompt" required maxlength="16000" rows="3" placeholder="描述要生成的图片"></textarea>
            <label for="task-assets">固定版本参考资产（可选）</label>
            <select id="task-assets" multiple size="4"></select>
            <label for="task-input-file">参考图片（可选）</label>
            <input id="task-input-file" type="file" accept="image/png,image/jpeg,image/webp">
            <button type="submit">提交任务</button>
          </form>
        </div>
        <div class="task-history-toolbar">
          <label for="task-status-filter">状态筛选</label>
          <select id="task-status-filter">
            <option value="">全部</option>
            <option value="queued">等待中</option>
            <option value="running">执行中</option>
            <option value="interrupted">已中断</option>
            <option value="completed">已完成</option>
            <option value="failed">失败</option>
          </select>
          <button id="download-task-archive" class="secondary-button compact" type="button">下载选中 ZIP</button>
        </div>
        <div id="task-list" class="item-list" aria-live="polite"></div>
      </section>

      <p id="workbench-error" class="error" aria-live="polite"></p>
    </main>
  </body>
</html>
