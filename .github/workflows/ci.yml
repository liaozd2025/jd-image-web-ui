name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install server dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
          python -m pip install --upgrade pip
          python -m pip install -r requirements-server.txt

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

  server-runtime:
    name: Server runtime and Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jd_image_test
          POSTGRES_USER: jd_image
          POSTGRES_PASSWORD: jd_image_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jd_image -d jd_image_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      JD_IMAGE_TEST_DATABASE_URL: postgresql://jd_image:jd_image_test@127.0.0.1:5432/jd_image_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install server dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
          python -m pip install --upgrade pip
          python -m pip install -r requirements-server.txt

      - name: Test server health, authentication, providers and user lifecycle with real PostgreSQL
        run: >-
          python -m unittest
          tests.test_server_health
          tests.test_server_auth
          tests.test_server_providers
          tests.test_server_tasks
          tests.test_server_scheduler
          tests.test_server_assets
          tests.test_server_shared_assets
          tests.test_server_department_providers
          tests.test_server_admin_views
          tests.test_server_maintenance
          tests.test_server_user_lifecycle
          -v

      - name: Test proxy, service degradation and persistence through Compose
        env:
          JD_IMAGE_RUN_COMPOSE_SMOKE: "1"
        run: python -m unittest tests.test_server_compose_smoke -v

  release-gate:
    name: Server-only release gate
    runs-on: ubuntu-latest
    needs: [python-tests, server-runtime]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Run static release gate
        run: python scripts/release_gate.py --static-only

  public-export-guard:
    name: Public export guard
    if: github.repository == 'liaozd2025/jd-image-web-ui'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check public mirror boundaries
        run: |
          test ! -e AGENTS.md
          test ! -e DESIGN.md
          test ! -d docs/superpowers
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(".")
          forbidden_literals = ["/Users" + "/ilab"]
          secret_pattern = re.compile(r"\bsk-[A-Za-z0-9_-]{20,}\b")
          ignored_dirs = {".git", ".venv", "venv", "node_modules", "__pycache__"}
          problems = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for literal in forbidden_literals:
                  if literal in text:
                      problems.append(f"{path}: contains {literal}")
              if secret_pattern.search(text):
                  problems.append(f"{path}: contains a long sk-* shaped token")

          if problems:
              print("\n".join(problems), file=sys.stderr)
              raise SystemExit(1)
          PY
