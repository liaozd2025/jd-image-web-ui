services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${JD_IMAGE_POSTGRES_DB:-jd_image}
      POSTGRES_USER: ${JD_IMAGE_POSTGRES_USER:-jd_image}
      POSTGRES_PASSWORD: ${JD_IMAGE_POSTGRES_PASSWORD:-}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.server
    environment: &server_environment
      JD_IMAGE_DATABASE_URL: ${JD_IMAGE_DATABASE_URL:-postgresql://${JD_IMAGE_POSTGRES_USER:-jd_image}:${JD_IMAGE_POSTGRES_PASSWORD:-}@postgres:5432/${JD_IMAGE_POSTGRES_DB:-jd_image}}
      JD_IMAGE_DATA_ROOT: /srv/jd-image-data
      JD_IMAGE_MASTER_KEY: ${JD_IMAGE_MASTER_KEY:?JD_IMAGE_MASTER_KEY is required}
      JD_IMAGE_DATABASE_CONNECT_TIMEOUT_SECONDS: ${JD_IMAGE_DATABASE_CONNECT_TIMEOUT_SECONDS:-2}
      JD_IMAGE_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${JD_IMAGE_WORKER_HEARTBEAT_INTERVAL_SECONDS:-2}
      JD_IMAGE_WORKER_HEARTBEAT_TTL_SECONDS: ${JD_IMAGE_WORKER_HEARTBEAT_TTL_SECONDS:-10}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health/live', timeout=2).read()
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - server_data:/srv/jd-image-data
      - backup_data:/srv/jd-image-backups

  worker:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.server
    command:
      - python
      - -m
      - codex_image.server.worker
    environment: *server_environment
    volumes:
      - server_data:/srv/jd-image-data

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - ${JD_IMAGE_HTTP_PORT:-8787}:80
    volumes:
      - ./deploy/server/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  server_data:
  backup_data:
